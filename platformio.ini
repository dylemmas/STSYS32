[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

board_build.partitions = partitions_ota.csv
board_build.f_cpu = 240000000L

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_FREERTOS_HZ=1000
    -DBUILD_VERSION_MAJOR=1
    -DBUILD_VERSION_MINOR=0
    -DBUILD_VERSION_PATCH=1
    -DCONFIG_FREERTOS_HZ=1000
    -DconfigCHECK_FOR_STACK_OVERFLOW=2
    -DconfigUSE_STACK_CHECKING=1
    -DconfigUSE_APPLICATION_TASK_TAG=1
    -DFIRMWARE_FCC_ID=\"STASYS-ESP32-V1\"
    -DFIRMWARE_IC_ID=\"XXXXX\"
    -DFIRMWARE_CE_MARKED=1

extra_scripts = pre:build_timestamp.py
# Production build with secure boot signing (uncomment for production):
# extra_scripts = pre:build_timestamp.py:post:scripts/secure_boot.py
# Production build with flash encryption + secure boot:
# extra_scripts = pre:build_timestamp.py:post:scripts/secure_boot.py:encrypt

lib_deps =

[env:production]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

board_build.partitions = partitions_ota.csv
board_build.f_cpu = 240000000L

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_FREERTOS_HZ=1000
    -DBUILD_VERSION_MAJOR=1
    -DBUILD_VERSION_MINOR=0
    -DBUILD_VERSION_PATCH=1
    -DCONFIG_FREERTOS_HZ=1000
    -DconfigCHECK_FOR_STACK_OVERFLOW=2
    -DconfigUSE_STACK_CHECKING=1
    -DconfigUSE_APPLICATION_TASK_TAG=1
    -DPRODUCTION_BUILD=1
    # Replace with your actual FCC/IC IDs from certification:
    -DFIRMWARE_FCC_ID=\"STASYS-ESP32-V1\"
    -DFIRMWARE_IC_ID=\"YOUR-IC-ID\"
    -DFIRMWARE_CE_MARKED=1
    # Enable authentication in production
    -DREQUIRE_AUTH=1
    # Note: FIRMWARE_IC_ID must NOT be "XXXXX" — the build will #error if it is
    # Secure boot and flash encryption are enabled via extra_scripts below.
    # Run `pio run --environment production` to build.
    # Run `pio run --environment production --target upload` to flash.

extra_scripts =
    pre:build_timestamp.py
    post:scripts/secure_boot.py

lib_deps =
