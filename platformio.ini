[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor speed
monitor_speed = 115200

; Partition scheme (Use 'min_spiffs' or 'huge_app' to give more space for BT stack)
board_build.partitions = min_spiffs.csv

; Ensure CPU runs at 240MHz
board_build.f_cpu = 240000000L

; Libraries (PlatformIO will automatically download these)
lib_deps =
    ; Built-in libraries like BluetoothSerial and Wire are included automatically
    ; but sometimes explicit references help if you use external libs later.
    ; For now, no external library dependencies are strictly needed 
    ; because you are using core ESP32 libraries.

; Optional: Build flags to suppress warnings or define macros
build_flags = 
    -DCORE_DEBUG_LEVEL=0